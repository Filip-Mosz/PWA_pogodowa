<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Stan pogody</title>
    <link rel="manifest" href="./manifest.json"></link>
    <meta name="theme-color" content="#1d83d4"></meta>
</head>
<body>
    <header>
        <h1>Aplikacja Pogodowa</h1>
    </header>
    <main>
        <div class="location">
            <p class="city-name"></p>
        </div>
        <div class="search">
            <div>
                <p>
                    &#x1F50D;
                    <input type="text" placeholder="Podaj nazwę miasta">
                </p>
            </div>
            <p class="error-message"></p>
        </div>
        <div class="weather">
            <div class="weather-top">
                <p class="date"></p>
                <div class="temp-info">
                    <p class="temp">temperatura</p>
                    <div>
                        <p class="description"></p>
                        <p class="feels-like"></p>
                    </div>
                </div>
            </div>
            <div class="weather-bottom">
                <div class="weather-info">
                    <p>Prędkość wiatru</p>
                    <p class="wind-speed">... ależ wieje ...</p>
                </div>
                <div class="weather-info">
                    <p>Ciśnienie</p>
                    <p class="pressure"></p>
                </div>
                <div class="weather-info">
                    <p>Wilgotność</p>
                    <p class="humidity"></p>
                </div>
                <div class="weather-info">
                    <p>Widoczność</p>
                    <p class="visibility"></p>
                </div>
                <div class="weather-info">
                    <p>Zachmurzenie</p>
                    <p class="clouds"></p>
                </div>
                <div class="weather-info">
                    <p>Opady</p>
                    <p class="rain">zmoczy sąsiadom pranie, he he</p>
                </div>
            </div>
        </div>

    </main>
    <footer>
        <p>Projekt WSB Merito Gdynia 2026</p>
        <p>Autor: Filip Moszczyński 84893</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./main.js"></script>
    <script src="./sw.js"></script>
</body>
</html>
